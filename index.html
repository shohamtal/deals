<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דילים</title>
  <meta name="description" content="דילים שנאספו מרחבי העולם. עיון, סינון ומיון — החל משעונים." />
  <link rel="preconnect" href="https://docs.google.com" />
  <link rel="stylesheet" href="styles.css?v=11" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand-block">
        <h1 id="brandTitle">🏷️ דילים</h1>
        <p class="tagline" id="tagline"></p>
      </div>
      <div class="header-right">
        <span class="header-status" id="headerStatus"></span>

        <div class="lang" id="lang">
          <button type="button" class="lang-btn" id="langBtn" aria-haspopup="true" aria-expanded="false">🇮🇱</button>
          <div class="lang-menu" role="menu">
            <button type="button" data-lang="he" role="menuitem">🇮🇱 עברית</button>
            <button type="button" data-lang="en" role="menuitem">🇺🇸 English</button>
          </div>
        </div>

        <button type="button" id="themeToggle" class="theme-toggle" data-i18n-title="themeToggle" aria-label="Toggle theme"></button>
      </div>
    </div>

    <nav class="tabs" id="tabs" aria-label="Categories"></nav>

    <button type="button" id="filtersToggle" class="filters-toggle" aria-expanded="false" aria-controls="filters">
      <span data-i18n="filtersToggle">Filters</span>
      <span class="ft-chevron" aria-hidden="true">▾</span>
    </button>

    <div class="filters" id="filters">
      <div class="filter-field grow">
        <label for="q" data-i18n="searchLabel">Search</label>
        <input type="search" id="q" data-i18n-ph="searchPlaceholder" autocomplete="off" />
      </div>
      <div class="filter-field grow">
        <label for="qx" data-i18n="excludeLabel">Exclude</label>
        <input type="search" id="qx" data-i18n-ph="excludePlaceholder" autocomplete="off" />
      </div>
      <div class="filter-field">
        <label data-i18n="brandLabel">Brand</label>
        <div class="ms" data-ms="brand"></div>
      </div>
      <div class="filter-field">
        <label data-i18n="countryLabel">Country</label>
        <div class="ms" data-ms="country"></div>
      </div>
      <div class="filter-field">
        <label data-i18n="sourceLabel">Source</label>
        <div class="ms" data-ms="source"></div>
      </div>
      <div class="filter-field">
        <label for="condition" data-i18n="conditionLabel">Condition</label>
        <select id="condition"><option value="" data-i18n="anyCondition">Any condition</option></select>
      </div>
      <div class="filter-field narrow">
        <label for="minPrice" data-i18n="minPrice">Min $</label>
        <input type="number" id="minPrice" min="0" step="500" placeholder="0" inputmode="numeric" />
      </div>
      <div class="filter-field narrow">
        <label for="maxPrice" data-i18n="maxPrice">Max $</label>
        <input type="number" id="maxPrice" min="0" step="500" placeholder="∞" inputmode="numeric" />
      </div>
      <div class="filter-field">
        <label for="dateFrom" data-i18n="dateFromLabel">From date</label>
        <input type="date" id="dateFrom" />
      </div>
      <div class="filter-field">
        <label for="dateTo" data-i18n="dateToLabel">To date</label>
        <input type="date" id="dateTo" />
      </div>
      <div class="filter-field">
        <label for="sort" data-i18n="sortLabel">Sort by</label>
        <select id="sort">
          <option value="date_desc" data-i18n="sort_date_desc">Date · newest first</option>
          <option value="date_asc" data-i18n="sort_date_asc">Date · oldest first</option>
          <option value="price_asc" data-i18n="sort_price_asc">Price · low to high</option>
          <option value="price_desc" data-i18n="sort_price_desc">Price · high to low</option>
          <option value="brand_asc" data-i18n="sort_brand_asc">Brand · A–Z</option>
        </select>
      </div>
      <div class="saved" id="saved">
        <button type="button" class="saved-btn" id="savedBtn" data-i18n="savedBtn" aria-haspopup="true" aria-expanded="false">Saved</button>
        <div class="saved-menu" role="menu">
          <div class="saved-new">
            <input type="text" class="saved-name" id="savedName" data-i18n-ph="savedNamePh" autocomplete="off" maxlength="60" />
            <button type="button" class="saved-add" id="savedAdd" data-i18n="savedAdd">Save</button>
          </div>
          <div class="saved-note" id="savedNote" hidden></div>
          <div class="saved-list" id="savedList"></div>
          <div class="saved-empty" id="savedEmpty" data-i18n="savedEmpty">No saved searches</div>
        </div>
      </div>
      <button type="button" id="reset" class="reset-btn" data-i18n="reset" data-i18n-title="resetTitle">Reset</button>
    </div>
  </header>

  <main>
    <div class="results-bar">
      <span id="resultsSummary" class="results-summary"></span>
      <span id="onlyWithPrice" class="chip-toggle">
        <label><input type="checkbox" id="hasPriceChk" /> <span data-i18n="onlyPriced">Only listings with a price</span></label>
      </span>
    </div>

    <div id="grid" class="grid" aria-live="polite"></div>

    <div id="emptyState" class="empty-state" hidden>
      <p data-i18n="empty">No listings match your filters.</p>
      <button type="button" class="reset-btn" data-i18n="clearFilters" onclick="document.getElementById('reset').click()">Clear filters</button>
    </div>

    <nav id="pagination" class="pagination" aria-label="Pagination"></nav>
  </main>

  <footer class="site-footer">
    <p data-i18n="footer"></p>
  </footer>

  <script src="app.js?v=11"></script>
</body>
</html>
